name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (src)
        run: npm run typecheck

      - name: Type check (tests)
        run: npx tsc --noEmit --project tsconfig.test.json

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      # NOTE: Integration tests (test:integration) are intentionally excluded from CI.
      # They require a live solana-test-validator and a real QUIC-capable network path.
      # Run them locally with: npm run test:integration
